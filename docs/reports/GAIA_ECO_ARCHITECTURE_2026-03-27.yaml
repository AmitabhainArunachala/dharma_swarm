architecture:
  layers:
    - name: knowledge_policy
      capabilities:
        - Aptavani source registry
        - interpretation registry
        - policy compiler
        - gate definitions
      outputs:
        - machine-readable principle catalog
        - checkable policy rules
    - name: initiative_observation
      capabilities:
        - restoration initiative registry
        - site and baseline capture
        - monitoring plan capture
        - observation ingestion
      interfaces:
        - FERM-style initiative structure
        - OGC SensorThings
        - STAC
        - Darwin Core
    - name: evidence_verification
      capabilities:
        - claim graph
        - evidence object store
        - 3-of-5 oracle verification
        - challenge and remediation tracking
        - consent and grievance records
      reuse:
        - dharma_swarm/gaia_ledger.py
        - dharma_swarm/gaia_verification.py
        - dharma_swarm/gaia_fitness.py
    - name: reasoning_recommendation
      capabilities:
        - evidence-bound assessment
        - gate evaluation
        - pilot design suggestion
        - monitoring suggestion
      constraints:
        - advisory_only
        - cite_sources_in_outputs
        - separate_fact_from_inference
    - name: coordination_reporting
      capabilities:
        - operator console
        - project integrity cards
        - adaptive management review
        - exportable pilot reports
    - name: commons_governance
      capabilities:
        - scientific_mrv_council
        - community_worker_council
        - ethics_alignment_council
        - audit_challenge_desk

mvp:
  title: Aptavani policy compiler over a FERM-aligned initiative registry
  deliverables:
    - principle registry with provenance and interpretation status
    - initiative schema with planning, implementation, and monitoring sections
    - gate engine that emits pass, review, or block with evidence references
    - public project card with integrity class, evidence path, and challenge status
  avoid_for_now:
    - full marketplace flows
    - broad predictive modeling
    - complex live sensor integrations
    - production web suite redesign

technical_requirements:
  storage:
    - append-only ledger
    - relational store with geospatial support
    - object storage for evidence bundles
  api:
    - typed Python API surface
    - source-cited assessment responses
    - export endpoints for public claim cards and pilot reports
  governance:
    - role-based access control
    - challenge lifecycle
    - consent status tracking
    - immutable reversal visibility
  interoperability:
    - FERM-compatible field mapping
    - STAC asset references
    - SensorThings observation ingestion
    - Darwin Core-compatible biodiversity records

success_criteria:
  - current GAIA kernel remains the trust anchor
  - every public claim has methodology, evidence path, and challenge path
  - direct source claims and design inferences are clearly separated
  - ecological and livelihood integrity are co-measured
  - the first pilot can be staged without inventing a parallel stack

