  Define the smallest credible GAIA-ECO architecture that translates Aptavani-informed
  principles into auditable ecological restoration coordination on top of the current
  dharma_swarm GAIA runtime.

current_state:
  strengths:
    - append-only GAIA ledger for compute, funding, labor, offset, and verification
    - 3-of-5 oracle verification across satellite, iot_sensor, human_auditor, community, and statistical_model
    - conservation checks and Goodhart-drift detection
    - operator-facing recommendation and pilot staging surface
  gaps:
    - no Aptavani principle registry or policy compiler
    - no standards-aligned initiative registry
    - no geospatial observation plane
    - no biodiversity schema integration
    - no public challenge and remediation workflow
    - no governance role model for science, community, ethics, and audit

