\* TLA+ Model Configuration for TaskBoardCoordination
\*
\* This configures the TLC model checker to verify the task board
\* coordination protocol.

SPECIFICATION Spec

\* Define the model size (small for fast checking)
CONSTANTS
    Agents = {a1, a2, a3}
    Tasks = {t1, t2, t3, t4}
    MaxConcurrent = 2

\* Invariants to check (safety properties)
INVARIANTS
    TypeOK
    NoTaskDuplication
    ClaimedTasksHaveOwner
    CompletedTasksHaveResults
    AgentCapacityRespected
    FailedAgentsHaveNoTasks
    OwnershipConsistency

\* Properties to check (liveness properties)
PROPERTIES
    EventualCompletion
    ClaimedTasksEventuallyComplete
    NoStuckTasks

\* Constraints to limit state space exploration
CONSTRAINT
    \* Limit the depth of exploration (prevents infinite state space)
    \* In practice, this limits how many steps the model checker explores
    TLCGet("level") < 20
