\* TLA+ Model Configuration for TaskBoardCoordination
\*
\* This configures the TLC model checker to verify the task board
\* coordination protocol.

SPECIFICATION Spec

\* Define the model size (minimal for fast checking)
CONSTANTS
    Agents = {a1, a2}
    Tasks = {t1, t2}
    MaxConcurrent = 2
    NULL = null
    Results = {r1, r2}

\* Invariants to check (safety properties)
INVARIANTS
    TypeOK
    ClaimedTasksHaveOwner
    CompletedTasksHaveResults
    AgentCapacityRespected
    FailedAgentsHaveNoTasks
    OwnershipConsistency
    NoStuckTasks

\* Check for deadlocks (disabled because deadlock is acceptable when all agents fail)
CHECK_DEADLOCK FALSE

\* Liveness properties omitted - system allows arbitrary agent failures which can
\* prevent progress. Safety invariants above prove the system doesn't reach
\* inconsistent states, which is the critical guarantee.
