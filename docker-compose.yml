version: "3.8"

services:
  web:
    build: .
    container_name: dharmic-quant-web
    ports:
      - "8080:8080"
    volumes:
      - ginko-data:/root/.dharma/ginko
    environment:
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - FRED_API_KEY=${FRED_API_KEY:-}
      - FINNHUB_API_KEY=${FINNHUB_API_KEY:-}
      - OLLAMA_API_KEY=${OLLAMA_API_KEY:-}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/fleet"]
      interval: 30s
      timeout: 5s
      retries: 3


  swarm:
    build:
      context: .
      dockerfile: Dockerfile.swarm
    container_name: dharma-swarm
    ports:
      - "7433:7433"   # health API: curl http://localhost:7433/health
    volumes:
      - dharma-state:/root/.dharma
      - ./dharma_swarm:/app/dharma_swarm:ro  # hot-reload source
    environment:
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - TINY_ROUTER_BACKEND=heuristic
      - DHARMA_EVOLUTION_SHADOW=${DHARMA_EVOLUTION_SHADOW:-0}
      - DGC_AUTONOMY_LEVEL=${DGC_AUTONOMY_LEVEL:-2}
      - DHARMA_STATE_DIR=/root/.dharma
      - GUARDIAN_INTERVAL_SECONDS=14400
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7433/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s

  cron:
    build: .
    container_name: dharmic-quant-cron
    volumes:
      - ginko-data:/root/.dharma/ginko
    environment:
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - FRED_API_KEY=${FRED_API_KEY:-}
      - FINNHUB_API_KEY=${FINNHUB_API_KEY:-}
    entrypoint: ["python3", "-c", "
import asyncio, time, logging;
logging.basicConfig(level=logging.INFO);
logger = logging.getLogger('ginko-cron');
async def run_cycle():
    from dharma_swarm.ginko_orchestrator import action_full_cycle;
    result = await action_full_cycle();
    logger.info('Cycle complete: %s', {k: 'OK' if not isinstance(v, dict) or 'error' not in v else v['error'] for k, v in result.items() if k != 'total_duration_ms'});
    return result;
while True:
    try: asyncio.run(run_cycle());
    except Exception as e: logger.error('Cycle failed: %s', e);
    time.sleep(21600);
"]
    restart: unless-stopped

volumes:
  dharma-state:
    driver: local
  ginko-data:
    driver: local
