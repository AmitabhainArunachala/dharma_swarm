  function buildVisualization(sessions, crossPollinations) {
    const width = window.innerWidth;
    const height = window.innerHeight;

    // --- Stats ---
    document.getElementById('stat-sessions').textContent = sessions.length;
    const totalMinutes = sessions.reduce((s, d) => s + d.duration_minutes, 0);
    document.getElementById('stat-hours').textContent = Math.round(totalMinutes / 60);
    document.getElementById('stat-xp').textContent = crossPollinations.length;

    // --- Build edges from concept overlap ---
    const edges = [];
    for (let i = 0; i < sessions.length; i++) {
      for (let j = i + 1; j < sessions.length; j++) {
        const shared = sessions[i].concepts.filter(c => sessions[j].concepts.includes(c));
        if (shared.length >= 2) {
          edges.push({
            source: sessions[i].id,
            target: sessions[j].id,
            shared: shared,
            weight: shared.length
          });
        }
      }
    }
    document.getElementById('stat-connections').textContent = edges.length;

    // --- Recency scale ---
    const dateExtent = d3.extent(sessions, d => new Date(d.date));
    const recencyScale = d3.scaleLinear()
      .domain([dateExtent[0], dateExtent[1]])
      .range([0.35, 1.0]);

    // --- Node radius scale ---
    const radiusScale = d3.scaleSqrt()
      .domain(d3.extent(sessions, d => d.duration_minutes))
      .range([14, 40]);

    // --- SVG setup ---
    const svg = d3.select('#graph');

    // --- Defs: filters and gradients ---
    const defs = svg.append('defs');

    // Glow filter for nodes
    const glowFilter = defs.append('filter')
      .attr('id', 'glow')
      .attr('x', '-50%').attr('y', '-50%')
      .attr('width', '200%').attr('height', '200%');
    glowFilter.append('feGaussianBlur')
      .attr('stdDeviation', '6')
      .attr('result', 'blur');
    glowFilter.append('feComposite')
      .attr('in', 'SourceGraphic')
      .attr('in2', 'blur')
      .attr('operator', 'over');

    // Softer glow for edges
    const edgeGlow = defs.append('filter')
      .attr('id', 'edge-glow')
      .attr('x', '-20%').attr('y', '-20%')
      .attr('width', '140%').attr('height', '140%');
    edgeGlow.append('feGaussianBlur')
      .attr('stdDeviation', '2')
      .attr('result', 'blur');
    edgeGlow.append('feComposite')
      .attr('in', 'SourceGraphic')
      .attr('in2', 'blur')
      .attr('operator', 'over');

    // XP glow for cross-pollination edges
    const xpGlow = defs.append('filter')
      .attr('id', 'xp-glow')
      .attr('x', '-30%').attr('y', '-30%')
      .attr('width', '160%').attr('height', '160%');
    xpGlow.append('feGaussianBlur')
      .attr('stdDeviation', '4')
      .attr('result', 'blur');
    xpGlow.append('feComposite')
      .attr('in', 'SourceGraphic')
      .attr('in2', 'blur')
      .attr('operator', 'over');

    // --- Containers ---
    const container = svg.append('g').attr('class', 'zoom-container');
    const edgeGroup = container.append('g').attr('class', 'edges');
    const xpEdgeGroup = container.append('g').attr('class', 'xp-edges').style('opacity', 0);
    const particleGroup = container.append('g').attr('class', 'particles');
    const nodeGroup = container.append('g').attr('class', 'nodes');

    // --- Zoom ---
    const zoom = d3.zoom()
      .scaleExtent([0.3, 4])
      .on('zoom', (event) => {
        container.attr('transform', event.transform);
      });
    svg.call(zoom);

    // --- Force simulation ---
    const simulation = d3.forceSimulation(sessions)
      .force('link', d3.forceLink(edges)
        .id(d => d.id)
        .distance(d => 180 - d.weight * 20)
        .strength(d => 0.3 + d.weight * 0.1))
      .force('charge', d3.forceManyBody()
        .strength(-400)
        .distanceMax(500))
      .force('center', d3.forceCenter(width / 2, height / 2))
      .force('collision', d3.forceCollide()
        .radius(d => radiusScale(d.duration_minutes) + 8))
      .alphaDecay(0.015)
      .velocityDecay(0.4);

    // --- Draw edges ---
    const edgeElements = edgeGroup.selectAll('line')
      .data(edges)
      .enter()
      .append('line')
      .attr('stroke', '#1a1a30')
      .attr('stroke-width', d => 0.5 + d.weight * 0.6)
      .attr('filter', 'url(#edge-glow)')
      .attr('opacity', 0.5);

    // --- XP edges (cross-pollination, initially hidden) ---
    const xpLookup = {};
    crossPollinations.forEach(xp => {
      const key = [xp.source_session, xp.target_session].sort().join('--');
      xpLookup[key] = xp;
    });

    const xpEdges = crossPollinations.map(xp => ({
      source: sessions.find(s => s.id === xp.source_session),
      target: sessions.find(s => s.id === xp.target_session),
      xp: xp
    })).filter(e => e.source && e.target);

    const xpEdgeElements = xpEdgeGroup.selectAll('line')
      .data(xpEdges)
      .enter()
      .append('line')
      .attr('stroke', '#ddb44a')
      .attr('stroke-width', 1.5)
      .attr('stroke-dasharray', '6,4')
      .attr('filter', 'url(#xp-glow)')
      .attr('opacity', 0.6);

    // --- Draw nodes ---
    const nodeElements = nodeGroup.selectAll('g')
      .data(sessions)
      .enter()
      .append('g')
      .attr('class', 'node')
      .style('cursor', 'pointer')
      .call(d3.drag()
        .on('start', dragStarted)
        .on('drag', dragged)
        .on('end', dragEnded));

    // Outer glow ring
    nodeElements.append('circle')
      .attr('r', d => radiusScale(d.duration_minutes) + 4)
      .attr('fill', 'none')
      .attr('stroke', d => AGENT_COLORS[d.agent_type] || '#666')
      .attr('stroke-width', 1.5)
      .attr('opacity', d => recencyScale(new Date(d.date)) * 0.25)
      .attr('filter', 'url(#glow)');

    // Main circle
    nodeElements.append('circle')
      .attr('class', 'node-core')
      .attr('r', d => radiusScale(d.duration_minutes))
      .attr('fill', d => {
        const color = AGENT_COLORS[d.agent_type] || '#666';
        return color;
      })
      .attr('fill-opacity', d => recencyScale(new Date(d.date)) * 0.7)
      .attr('stroke', d => AGENT_COLORS[d.agent_type] || '#666')
      .attr('stroke-width', 1)
      .attr('stroke-opacity', d => recencyScale(new Date(d.date)))
      .attr('filter', 'url(#glow)');

    // Inner detail: concept count text
    nodeElements.append('text')
      .text(d => d.concepts.length)
      .attr('text-anchor', 'middle')
      .attr('dominant-baseline', 'central')
      .attr('font-size', d => Math.max(9, radiusScale(d.duration_minutes) * 0.4))
      .attr('font-weight', '600')
      .attr('fill', '#fff')
      .attr('fill-opacity', d => recencyScale(new Date(d.date)) * 0.8)
      .style('pointer-events', 'none');

    // --- Particles ---
    const particleData = [];
    edges.forEach(edge => {
      const count = Math.min(edge.weight, 4);
      for (let i = 0; i < count; i++) {
        particleData.push({
          edge: edge,
          offset: Math.random(),
          speed: 0.0008 + Math.random() * 0.0012,
          direction: Math.random() > 0.5 ? 1 : -1,
          size: 1.5 + Math.random() * 1.5
        });
      }
    });

    const particleElements = particleGroup.selectAll('circle')
      .data(particleData)
      .enter()
      .append('circle')
      .attr('r', d => d.size)
      .attr('fill', '#ddb44a')
      .attr('opacity', 0.6);

    // --- Tooltip ---
    const tooltip = d3.select('#tooltip');
    const ttTitle = tooltip.select('.tt-title');
    const ttMeta = tooltip.select('.tt-meta');

    nodeElements
      .on('mouseenter', function (event, d) {
        const dateStr = new Date(d.date).toLocaleDateString('en-US', {
          month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit'
        });
        ttTitle.text(d.summary.split('.')[0]);
        ttMeta.text(d.agent_type + '  --  ' + d.duration_minutes + 'min  --  ' + dateStr);
        tooltip.classed('visible', true);

        // Highlight connected edges
        edgeElements.attr('opacity', e =>
          (e.source.id === d.id || e.target.id === d.id) ? 0.9 : 0.08
        ).attr('stroke', e =>
          (e.source.id === d.id || e.target.id === d.id)
            ? AGENT_GLOW[d.agent_type] || 'rgba(100,100,100,0.4)'
            : '#1a1a30'
        );

        // Dim unconnected nodes
        const connectedIds = new Set();
        connectedIds.add(d.id);
        edges.forEach(e => {
          const sid = typeof e.source === 'object' ? e.source.id : e.source;
          const tid = typeof e.target === 'object' ? e.target.id : e.target;
          if (sid === d.id) connectedIds.add(tid);
          if (tid === d.id) connectedIds.add(sid);
        });

        nodeElements.select('.node-core')
          .attr('fill-opacity', n =>
            connectedIds.has(n.id)
              ? recencyScale(new Date(n.date)) * 0.85
              : recencyScale(new Date(n.date)) * 0.15
          );
      })
      .on('mousemove', function (event) {
        tooltip
          .style('left', (event.pageX + 16) + 'px')
          .style('top', (event.pageY - 10) + 'px');
      })
      .on('mouseleave', function () {
        tooltip.classed('visible', false);
        edgeElements
          .attr('opacity', 0.5)
          .attr('stroke', '#1a1a30');
        nodeElements.select('.node-core')
          .attr('fill-opacity', n => recencyScale(new Date(n.date)) * 0.7);
      })
      .on('click', function (event, d) {
        event.stopPropagation();
        openSidebar(d, sessions, crossPollinations, edges);
      });

    // Close sidebar on background click
    svg.on('click', () => closeSidebar());

    // --- Simulation tick ---
    simulation.on('tick', () => {
      edgeElements
        .attr('x1', d => d.source.x)
        .attr('y1', d => d.source.y)
        .attr('x2', d => d.target.x)
        .attr('y2', d => d.target.y);

      xpEdgeElements
        .attr('x1', d => d.source.x)
        .attr('y1', d => d.source.y)
        .attr('x2', d => d.target.x)
        .attr('y2', d => d.target.y);

      nodeElements.attr('transform', d => `translate(${d.x},${d.y})`);
    });

    // --- Particle animation loop ---
    function animateParticles() {
      const now = Date.now();
      particleElements.each(function (d) {
        d.offset += d.speed * d.direction;
        if (d.offset > 1) d.offset -= 1;
        if (d.offset < 0) d.offset += 1;

        const source = d.edge.source;
        const target = d.edge.target;
        if (source.x == null || target.x == null) return;

        const t = d.offset;
        const x = source.x + (target.x - source.x) * t;
        const y = source.y + (target.y - source.y) * t;

        d3.select(this)
          .attr('cx', x)
          .attr('cy', y)
          .attr('opacity', 0.3 + 0.4 * Math.sin(t * Math.PI));
      });
      requestAnimationFrame(animateParticles);
    }
    animateParticles();

    // --- Node breathing animation ---
    function breathe() {
      nodeElements.select('.node-core')
        .transition()
        .duration(3000)
        .ease(d3.easeSinInOut)
        .attr('r', d => radiusScale(d.duration_minutes) * 1.04)
        .transition()
        .duration(3000)
        .ease(d3.easeSinInOut)
        .attr('r', d => radiusScale(d.duration_minutes))
        .on('end', function () {
          // Only restart on the first node to avoid stacking
          if (this === nodeElements.select('.node-core').node()) {
            breathe();
          }
        });
    }
    // Stagger breathing start
    setTimeout(breathe, 1000);

    // --- XP toggle ---
    let xpVisible = false;
    const xpToggle = document.getElementById('xp-toggle');
    xpToggle.addEventListener('click', () => {
      xpVisible = !xpVisible;
      xpToggle.classList.toggle('active', xpVisible);
      xpToggle.textContent = xpVisible ? 'Hide Cross-pollinations' : 'Show Cross-pollinations';
      xpEdgeGroup
        .transition()
        .duration(500)
        .style('opacity', xpVisible ? 1 : 0);
    });

    // --- Drag handlers ---
    function dragStarted(event, d) {
      if (!event.active) simulation.alphaTarget(0.1).restart();
      d.fx = d.x;
      d.fy = d.y;
    }

    function dragged(event, d) {
      d.fx = event.x;
      d.fy = event.y;
    }

    function dragEnded(event, d) {
      if (!event.active) simulation.alphaTarget(0);
      d.fx = null;
      d.fy = null;
    }

    // --- Resize handler ---
    window.addEventListener('resize', () => {
      simulation.force('center', d3.forceCenter(window.innerWidth / 2, window.innerHeight / 2));
      simulation.alpha(0.3).restart();
    });
  }

  // --- Sidebar logic ---
  function openSidebar(session, allSessions, crossPollinations, edges) {
    const sidebar = document.getElementById('sidebar');
    sidebar.classList.add('open');

    const dateStr = new Date(session.date).toLocaleDateString('en-US', {
      weekday: 'short', year: 'numeric', month: 'short', day: 'numeric',
      hour: '2-digit', minute: '2-digit'
    });

    document.getElementById('sidebar-id').textContent = session.id;
    document.getElementById('sidebar-date').textContent = dateStr;

    const agentEl = document.getElementById('sidebar-agent');
    agentEl.textContent = session.agent_type;
    const color = AGENT_COLORS[session.agent_type] || '#666';
    agentEl.style.background = color + '18';
    agentEl.style.color = color;
    agentEl.style.border = '1px solid ' + color + '33';

    document.getElementById('sidebar-duration').textContent = '  ' + session.duration_minutes + ' min';
    document.getElementById('sidebar-summary').textContent = session.summary;

    // Concepts -- find which are shared with other connected sessions
    const connectedConcepts = new Set();
    edges.forEach(e => {
      const sid = typeof e.source === 'object' ? e.source.id : e.source;
      const tid = typeof e.target === 'object' ? e.target.id : e.target;
      if (sid === session.id || tid === session.id) {
        e.shared.forEach(c => connectedConcepts.add(c));
      }
    });

    const conceptsEl = document.getElementById('sidebar-concepts');
    conceptsEl.innerHTML = '';
    session.concepts.forEach(c => {
      const tag = document.createElement('span');
      tag.className = 'concept-tag' + (connectedConcepts.has(c) ? ' shared' : '');
      tag.textContent = c;
      conceptsEl.appendChild(tag);
    });

    // Stats
    document.getElementById('sidebar-stats').innerHTML =
      '<div class="sidebar-stat"><div class="sidebar-stat-value">' + session.files_touched + '</div><div class="sidebar-stat-label">Files touched</div></div>' +
      '<div class="sidebar-stat"><div class="sidebar-stat-value">' + session.tests_written + '</div><div class="sidebar-stat-label">Tests written</div></div>';

    // Gotchas
    const gotchasEl = document.getElementById('sidebar-gotchas');
    gotchasEl.innerHTML = '';
    (session.gotchas || []).forEach(g => {
      const li = document.createElement('li');
      li.textContent = g;
      gotchasEl.appendChild(li);
    });

    // Cross-pollinations involving this session
    const relatedXP = crossPollinations.filter(
      xp => xp.source_session === session.id || xp.target_session === session.id
    );

    const xpSection = document.getElementById('sidebar-xp-section');
    const xpContainer = document.getElementById('sidebar-xp');
    xpContainer.innerHTML = '';

    if (relatedXP.length > 0) {
      xpSection.style.display = 'block';
      relatedXP.forEach(xp => {
        const card = document.createElement('div');
        card.className = 'xp-card';

        const header = document.createElement('div');
        header.className = 'xp-sessions';
        header.textContent = xp.source_session + ' <-> ' + xp.target_session +
          '  [' + xp.shared_concepts.join(', ') + ']';

        const body = document.createElement('div');
        body.textContent = xp.insight;

        card.appendChild(header);
        card.appendChild(body);
        xpContainer.appendChild(card);
      });
    } else {
      xpSection.style.display = 'none';
    }
  }

  function closeSidebar() {
    document.getElementById('sidebar').classList.remove('open');
  }

  document.getElementById('sidebar-close').addEventListener('click', (e) => {
    e.stopPropagation();
    closeSidebar();
  });

  // Escape key closes sidebar
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') closeSidebar();
  });
})();
</script>
</body>
</html>
