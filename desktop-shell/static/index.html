<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1"
    />
    <title>DHARMA COMMAND</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #090c14;
        --bg2: #111827;
        --border: rgba(125, 139, 166, 0.22);
        --text: #e5e7eb;
        --muted: #94a3b8;
        --accent: #69d2ff;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at top, rgba(105, 210, 255, 0.18), transparent 35%),
          linear-gradient(180deg, var(--bg), var(--bg2));
        color: var(--text);
        font-family: "SF Pro Display", "Helvetica Neue", sans-serif;
      }

      .panel {
        width: min(560px, calc(100vw - 48px));
        border: 1px solid var(--border);
        border-radius: 24px;
        padding: 28px;
        background: rgba(9, 12, 20, 0.82);
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.38);
      }

      h1 {
        margin: 0 0 10px;
        font-size: 28px;
        letter-spacing: 0.08em;
      }

      p {
        margin: 0;
        color: var(--muted);
        line-height: 1.6;
      }

      code {
        color: var(--accent);
      }
    </style>
  </head>
  <body>
    <main class="panel">
      <h1>DHARMA COMMAND</h1>
      <p>
        The native shell opens the same dashboard routes you already use in the browser.
        If you are seeing this page directly, the shell fallback assets loaded before the
        local runtime window was created.
      </p>
      <p style="margin-top: 16px;">
        Canonical dashboard URL: <code>http://127.0.0.1:3420/dashboard</code>
      </p>
    </main>
  </body>
</html>
