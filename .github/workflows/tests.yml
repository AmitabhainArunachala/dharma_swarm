name: tests

on:
  push:
    branches: [main, v2-gap-closure]
  pull_request:
    branches: [main]

jobs:
  pytest:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package + test deps
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Run full pytest suite
        run: python -m pytest -q --tb=short

  verify-humming:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - name: Install package + test deps
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Install dashboard deps
        run: npm ci --legacy-peer-deps
        working-directory: dashboard

      - name: Run humming verification
        run: python scripts/verify_humming.py
