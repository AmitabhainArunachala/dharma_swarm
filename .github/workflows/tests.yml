name: tests

on:
  push:
    branches: [main, v2-gap-closure]
  pull_request:
    branches: [main]

jobs:
  pytest:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package + test deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint (ruff)
        run: |
          pip install ruff
          ruff check dharma_swarm/ --select=E,F,W --ignore=E501,W291,W293 || true

      - name: Run tests (fast, no network)
        env:
          # Provide stub keys so provider init doesn't crash
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY || 'sk-or-stub' }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY || 'sk-ant-stub' }}
          TINY_ROUTER_BACKEND: heuristic
          DHARMA_EVOLUTION_SHADOW: "1"
          DGC_AUTONOMY_LEVEL: "0"
        run: |
          python -m pytest tests/ -q --tb=short \
            -x \
            --timeout=30 \
            -m "not slow and not docker and not network" \
            2>&1 | tee pytest_output.txt
          # Surface pass/fail counts
          tail -3 pytest_output.txt

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-results-${{ matrix.python-version }}
          path: pytest_output.txt

  guardian-syntax-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install -e ".[dev]"

      - name: Syntax check all modules (AUDITOR role)
        run: |
          python3 -c "
          import ast
          from pathlib import Path
          errors = []
          for f in sorted(Path('dharma_swarm').glob('*.py')):
              try:
                  ast.parse(f.read_text())
              except SyntaxError as e:
                  errors.append(f'{f.name}:{e.lineno}: {e.msg}')
          if errors:
              print('SYNTAX ERRORS:')
              for e in errors:
                  print(f'  {e}')
              raise SystemExit(1)
          print(f'OK: {len(list(Path(\"dharma_swarm\").glob(\"*.py\")))} files, 0 syntax errors')
          "

      - name: Check critical module imports
        run: |
          python3 -c "
          import sys
          sys.path.insert(0, '.')
          critical = [
              'dharma_swarm.world_actions',
              'dharma_swarm.dgm_loop',
              'dharma_swarm.archaeology_ingestion',
              'dharma_swarm.guardian_crew',
              'dharma_swarm.gnani_lodestone',
              'dharma_swarm.swarm_health_api',
          ]
          failed = []
          for m in critical:
              try:
                  __import__(m)
                  print(f'OK: {m}')
              except Exception as e:
                  # Allow missing optional deps (lancedb, etc.)
                  if 'lancedb' in str(e) or 'torch' in str(e) or 'No module named' in str(e):
                      print(f'SKIP (optional dep): {m} — {e}')
                  else:
                      failed.append(f'{m}: {e}')
                      print(f'FAIL: {m} — {e}')
          if failed:
              raise SystemExit(1)
          "

  dashboard:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - name: Install dashboard deps
        run: npm ci

      - name: Lint dashboard
        run: npm run lint -- --quiet

      - name: Build dashboard
        run: npm run build
